packages:
  - packages/*
  - packages-lib/*
  - packages-plugin/*
allowBuilds:
  "@parcel/watcher": true
  bufferutil: true
  esbuild: true
  utf-8-validate: true
catalog:
  "@antfu/eslint-config": ^6.7.3
  "@rollup/plugin-node-resolve": ^15.3.1
  "@rollup/plugin-replace": ^5.0.7
  "@rollup/plugin-typescript": ^12.3.0
  "@rollup/pluginutils": ^5.3.0
  baseline-browser-mapping: ^2.10.20
  bulma: ^1.0.4
  comlink: ^4.4.2
  cross-env: ^10.0.0
  dotenv: ^17.4.2
  eslint: ^9.39.4
  file-saver: ^2.0.5
  less: ^4.6.4
  marked: ^16.4.1
  open: ^8.4.2
  plop: ^4.0.4
  postcss: ^8.5.10
  rollup: ^4.60.2
  rollup-plugin-copy: ^3.5.0
  rollup-plugin-html-string: ^1.0.1
  rollup-plugin-livereload: ^2.0.5
  rollup-plugin-monkey: ^1.0.9
  rollup-plugin-postcss: ^4.0.2
  rollup-plugin-serve: ^2.0.3
  rollup-preset-solid: ^3.0.0
  sass: ^1.99.0
  solid-js: ^1.9.13
  tslib: ^2.8.1
  tsx: ^4.20.6
  typescript: ^5.9.3
  vite: ^7.3.2
  vite-plugin-monkey: ^7.1.9

catalogMode: prefer

onlyBuiltDependencies:
  - "@parcel/watcher"
  - bufferutil
  - core-js
  - esbuild
  - utf-8-validate

shellEmulator: true

trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
  - css-declaration-sorter@6.4.1
  - pino@9.14.0
  - "semver@5.7.2 || 6.3.1"
